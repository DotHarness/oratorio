<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="225 190 640 640" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Oratorio</title>
  <desc id="desc">A vector logo of a terminal robot conductor with simplified side hands and a baton directly attached to the right hand.</desc>
  <defs>
    <linearGradient id="blue" x1="279" y1="766" x2="736" y2="334" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1357ff"/>
      <stop offset="0.48" stop-color="#3f6cff"/>
      <stop offset="1" stop-color="#7f99ff"/>
    </linearGradient>
    <linearGradient id="blue-mark" x1="380" y1="696" x2="492" y2="557" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#085cf6"/>
      <stop offset="0.55" stop-color="#1d6cff"/>
      <stop offset="1" stop-color="#6f8dff"/>
    </linearGradient>
    <linearGradient id="yellow" x1="481" y1="174" x2="617" y2="713" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd51a"/>
      <stop offset="1" stop-color="#f4ae00"/>
    </linearGradient>
    <linearGradient id="black" x1="351" y1="760" x2="678" y2="892" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f2024"/>
      <stop offset="1" stop-color="#07080b"/>
    </linearGradient>
    <filter id="soft-shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#001026" flood-opacity=".42"/>
    </filter>
    <filter id="inner-lift" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0b2f88" flood-opacity=".16"/>
    </filter>
  </defs>

  <g transform="translate(128 128) scale(.75)">
