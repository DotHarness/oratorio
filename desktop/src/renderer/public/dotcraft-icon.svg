<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 1024 1024" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">DotCraft</title>
  <desc id="desc">A transparent vector icon of a white and blue terminal robot with yellow accents.</desc>
  <defs>
    <linearGradient id="blue" x1="279" y1="766" x2="736" y2="334" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2458f7"/>
      <stop offset=".46" stop-color="#5f82f7"/>
      <stop offset="1" stop-color="#8fa5ff"/>
    </linearGradient>
    <linearGradient id="blue-mark" x1="380" y1="696" x2="492" y2="557" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2257f5"/>
      <stop offset=".55" stop-color="#577df7"/>
      <stop offset="1" stop-color="#8ca2ff"/>
    </linearGradient>
    <linearGradient id="yellow" x1="481" y1="174" x2="617" y2="713" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffcf11"/>
      <stop offset="1" stop-color="#f6b500"/>
    </linearGradient>
    <filter id="soft-shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0b3d62" flood-opacity=".18"/>
    </filter>
    <filter id="inner-lift" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#163a88" flood-opacity=".1"/>
    </filter>
  </defs>

  <g transform="translate(512 528) scale(1.3) translate(-512 -512)">
    <g filter="url(#soft-shadow)">
      <rect x="201" y="365" width="622" height="513" rx="151" fill="#fff"/>
      <rect x="145" y="472" width="136" height="256" rx="58" fill="#fff"/>
      <rect x="743" y="472" width="136" height="256" rx="58" fill="#fff"/>
      <rect x="438" y="270" width="148" height="182" rx="2" fill="#fff"/>
      <circle cx="512" cy="229" r="116" fill="#fff"/>
    </g>

    <g filter="url(#inner-lift)">
      <rect x="243" y="408" width="538" height="426" rx="113" fill="url(#blue)"/>
      <rect x="188" y="514" width="90" height="171" rx="19" fill="url(#blue)"/>
      <rect x="746" y="514" width="90" height="171" rx="19" fill="url(#blue)"/>
      <rect x="479" y="337" width="66" height="119" rx="6" fill="url(#blue)"/>
    </g>

    <rect x="295" y="464" width="434" height="315" rx="78" fill="#fff"/>
    <circle cx="512" cy="229" r="73" fill="url(#yellow)"/>

    <path d="M387 568 477 634 387 700" stroke="url(#blue-mark)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M531 696h116" stroke="url(#yellow)" stroke-width="27" stroke-linecap="round"/>
  </g>
</svg>
