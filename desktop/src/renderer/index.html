<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%oratorio-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oratorio</title>
    <script>
      const launchThemeParam = new URLSearchParams(window.location.search).get('theme');
      document.documentElement.dataset.launchTheme = launchThemeParam === 'light' ? 'light' : 'dark';
    </script>
    <style>
      :root {
        color: #e5e5e5;
        background: #101317;
      }

      :root[data-launch-theme="light"] {
        color: #0f172a;
        background: #f7f9fc;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        min-height: 100%;
        background: inherit;
        overflow: hidden;
      }

      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
