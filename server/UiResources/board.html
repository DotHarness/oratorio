<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!--
  Oratorio · DotCraft Interactive Tool UI — board card (ListBoardItems).
  Self-contained on purpose: the host serves this document standalone, so relative
  asset references do not resolve. The design language mirrors DotCraft's tool-result
  cards (tokens + chrome from desktop/src/renderer/styles/tokens.css): a single
  bg-secondary surface, hairline-divided sections, pill badges, neutral-inversion
  primary action. Bridge contract: dotcraft tool-result-presentation.md §7.
-->
<style>
  :root {
    color-scheme: dark;
    --bg-primary: #141515; --bg-secondary: #202020; --bg-tertiary: #2a2a2a; --bg-active: #343434;
    --bg-hover: color-mix(in srgb, var(--text-primary) 8%, transparent);
    --text-primary: #eeeeec;
    --text-secondary: color-mix(in srgb, var(--text-primary) 66%, var(--bg-primary));
    --text-dimmed: color-mix(in srgb, var(--text-primary) 42%, var(--bg-primary));
    --border-default: color-mix(in srgb, var(--text-primary) 10%, transparent);
    --border-active: color-mix(in srgb, var(--text-primary) 18%, transparent);
    --accent: #4566cc; --success: #22c55e; --warning: #eab308; --error: #ef4444; --info: #3b82f6;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.22);
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei UI", sans-serif;
    --font-mono: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, monospace;
  }
  html[data-theme="light"] {
    color-scheme: light;
    --bg-primary: #f9f9f9; --bg-secondary: #ffffff; --bg-tertiary: #ededed; --bg-active: #e8e8e8;
    --bg-hover: color-mix(in srgb, var(--text-primary) 6%, transparent);
    --text-primary: #1a1c1f;
    --text-secondary: color-mix(in srgb, var(--text-primary) 70%, var(--bg-primary));
    --text-dimmed: color-mix(in srgb, var(--text-primary) 50%, var(--bg-primary));
    --border-default: color-mix(in srgb, var(--text-primary) 8%, transparent);
    --border-active: color-mix(in srgb, var(--text-primary) 12%, transparent);
    --accent: #4f6cce; --success: #16a34a; --warning: #c9a227; --error: #dc2626; --info: #2563eb;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; font: 13px/1.45 var(--font-ui); color: var(--text-primary); background: var(--bg-secondary); user-select: text; -webkit-font-smoothing: antialiased; }
  .mono { font-family: var(--font-mono); }

  .card { display: flex; flex-direction: column; height: 100vh; }

  .head { display: flex; align-items: flex-start; gap: 10px; padding: 11px 12px; border-bottom: 1px solid var(--border-default); }
  .head-text { display: grid; gap: 2px; min-width: 0; flex: 1; }
  .eyebrow { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-dimmed); }
  .title { font-size: 14px; font-weight: 600; line-height: 19px; color: var(--text-primary); }
  .summary { font-size: 12px; line-height: 16px; color: var(--text-secondary); }

  .body { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; }

  .list { display: flex; flex-direction: column; }
  .row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; cursor: pointer; transition: background 120ms ease; border-bottom: 1px solid var(--border-default); }
  .row:last-child { border-bottom: none; }
  .row:hover { background: var(--bg-hover); }
  .row-body { display: grid; gap: 3px; min-width: 0; flex: 1; }
  .row-head { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
  .row-title { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .row-fields { display: flex; flex-wrap: wrap; gap: 2px 12px; }
  .field { display: inline-flex; gap: 5px; font-size: 11.5px; color: var(--text-secondary); }
  .field .k { color: var(--text-dimmed); }
  .row-open { flex-shrink: 0; display: inline-flex; align-items: center; color: var(--text-dimmed); opacity: 0; transition: opacity 120ms ease, transform 120ms ease; margin-top: 1px; }
  .row:hover .row-open { opacity: 1; }
  .row:hover .row-open svg { transform: translate(1px, -1px); }

  .badge { display: inline-flex; align-items: center; height: 18px; padding: 0 7px; border-radius: 999px; font-size: 11px; line-height: 1; font-weight: 500; white-space: nowrap;
    color: var(--text-dimmed); background: color-mix(in srgb, var(--text-dimmed) 14%, transparent); border: 1px solid color-mix(in srgb, var(--text-dimmed) 28%, transparent); }
  .badge.tone-info { color: var(--info); background: color-mix(in srgb, var(--info) 14%, transparent); border-color: color-mix(in srgb, var(--info) 32%, transparent); }
  .badge.tone-warning { color: var(--warning); background: color-mix(in srgb, var(--warning) 14%, transparent); border-color: color-mix(in srgb, var(--warning) 32%, transparent); }
  .badge.tone-success { color: var(--success); background: color-mix(in srgb, var(--success) 14%, transparent); border-color: color-mix(in srgb, var(--success) 32%, transparent); }
  .badge.tone-danger { color: var(--error); background: color-mix(in srgb, var(--error) 14%, transparent); border-color: color-mix(in srgb, var(--error) 32%, transparent); }

  .footer { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 12px; border-top: 1px solid var(--border-default); background: color-mix(in srgb, var(--text-primary) 2%, transparent); }
  .btn { display: inline-flex; align-items: center; gap: 5px; height: 28px; padding: 0 11px; border-radius: 7px; border: 1px solid var(--border-default); background: var(--bg-tertiary); color: var(--text-secondary); font: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .btn:hover:not(:disabled) { background: var(--bg-active); color: var(--text-primary); border-color: var(--border-active); }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn.primary { margin-left: auto; background: var(--text-primary); border-color: var(--text-primary); color: var(--bg-primary); font-weight: 600; }
  .btn.primary:hover:not(:disabled) { background: color-mix(in srgb, var(--text-primary) 88%, var(--bg-primary)); color: var(--bg-primary); }
  .btn svg { width: 13px; height: 13px; }

  .empty { padding: 18px 12px; text-align: center; font-size: 12px; color: var(--text-dimmed); }
  .empty.error { color: var(--error); }

  .skeleton { display: flex; flex-direction: column; }
  .sk-row { display: grid; gap: 6px; padding: 11px 12px; border-bottom: 1px solid var(--border-default); }
  .sk-bar { height: 11px; border-radius: 4px; background: var(--bg-active); animation: skeleton-pulse 1.4s ease-in-out infinite; }
  @keyframes skeleton-pulse { 0%, 100% { opacity: .45; } 50% { opacity: .85; } }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dimmed); }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="head-text">
        <span class="eyebrow">Oratorio</span>
        <span class="title">Board</span>
        <span class="summary" id="summary">Loading board…</span>
      </div>
    </div>
    <div class="body" id="body">
      <div class="skeleton" id="skeleton"></div>
    </div>
    <div class="footer">
      <button class="btn" id="refresh" type="button"></button>
      <button class="btn primary" id="open" type="button"></button>
    </div>
  </div>
<script>
  "use strict";
  var pending = new Map();
  var nextId = 1;
  var bridgeToken = null;
  var toolInput = {};

  var ICON = {
    refresh: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg>',
    open: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>'
  };

  function request(method, params) {
    return new Promise(function (resolve, reject) {
      var id = nextId++;
      var message = { jsonrpc: "2.0", id: id, method: method, params: params };
      if (bridgeToken && method !== "ui/initialize") message.bridgeToken = bridgeToken;
      pending.set(id, { resolve: resolve, reject: reject });
      parent.postMessage(message, "*");
    });
  }

  function applyContext(ctx) {
    if (ctx && typeof ctx.theme === "string") document.documentElement.dataset.theme = ctx.theme;
  }

  function label(value) {
    return String(value == null ? "" : value)
      .replace(/([a-z])([A-Z])/g, "$1 $2").replace(/_/g, " ").toLowerCase();
  }

  function kindLabel(kind) {
    var k = label(kind);
    if (k.indexOf("pull") >= 0) return "PR";
    if (k.indexOf("local") >= 0) return "task";
    return k || "item";
  }

  function stateTone(state) {
    switch (state) {
      case "running": case "dispatching": return "info";
      case "awaitingReview": return "warning";
      case "approved": case "succeeded": return "success";
      case "rejected": case "failed": case "cancelled": return "danger";
      default: return "neutral";
    }
  }

  function btn(node, icon, text) {
    node.innerHTML = ICON[icon] || "";
    node.appendChild(document.createTextNode(text));
  }

  function el(tag, className, text) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (text != null) node.textContent = text;
    return node;
  }

  function badge(text, tone) {
    return el("span", "badge tone-" + (tone || "neutral"), text);
  }

  function setSummary(text) { document.getElementById("summary").textContent = text; }

  function showNote(text, isError) {
    var body = document.getElementById("body");
    body.textContent = "";
    body.appendChild(el("div", "empty" + (isError ? " error" : ""), text));
  }

  function render(structured) {
    var items = (structured && Array.isArray(structured.items)) ? structured.items : [];
    setSummary(items.length === 1 ? "1 item" : items.length + " items");
    if (items.length === 0) { showNote("No board items matched."); return; }

    var body = document.getElementById("body");
    body.textContent = "";
    var list = el("div", "list");

    items.forEach(function (item) {
      var row = el("div", "row");
      row.addEventListener("click", function () { openItem(item); });

      var rowBody = el("div", "row-body");
      var head = el("div", "row-head");
      head.appendChild(el("span", "row-title", item.title || "(untitled)"));
      head.appendChild(badge(kindLabel(item.kind)));
      if (item.state != null) head.appendChild(badge(label(item.state), stateTone(item.state)));
      if (item.taskStatus != null) head.appendChild(badge(label(item.taskStatus)));
      rowBody.appendChild(head);

      var fields = el("div", "row-fields");
      if (item.shortId) {
        var idField = el("span", "field mono");
        idField.textContent = item.shortId;
        fields.appendChild(idField);
      }
      [["repo", item.repository], ["assignee", item.assignee]].forEach(function (pair) {
        if (!pair[1]) return;
        var f = el("span", "field");
        f.appendChild(el("span", "k", pair[0]));
        f.appendChild(el("span", null, pair[1]));
        fields.appendChild(f);
      });
      if (fields.childNodes.length) rowBody.appendChild(fields);

      var open = el("span", "row-open");
      open.innerHTML = ICON.open;

      row.appendChild(rowBody);
      row.appendChild(open);
      list.appendChild(row);
    });

    body.appendChild(list);
  }

  function onToolResult(params) {
    if (params && params.isError) {
      var text = (params.content && params.content[0] && params.content[0].text) || "The board could not be loaded.";
      showNote(text, true);
      return;
    }
    render(params ? params.structuredContent : null);
  }

  function openItem(item) {
    var id = item.shortId || item.itemId;
    if (id) request("ui/open-link", { url: "oratorio://open/task/" + encodeURIComponent(id) }).catch(function () {});
  }

  var refresh = document.getElementById("refresh");
  var open = document.getElementById("open");
  btn(refresh, "refresh", "Refresh");
  btn(open, "open", "Open Oratorio");

  open.addEventListener("click", function () {
    request("ui/open-link", { url: "oratorio://open/board" }).catch(function () {});
  });

  refresh.addEventListener("click", function () {
    refresh.disabled = true;
    request("tools/call", { name: "ListBoardItems", arguments: toolInput })
      .then(function (result) { onToolResult(result); })
      .catch(function (err) { showNote(err && err.message ? err.message : "Refresh failed.", true); })
      .finally(function () { refresh.disabled = false; });
  });

  // Initial skeleton rows.
  (function () {
    var sk = document.getElementById("skeleton");
    for (var i = 0; i < 6; i++) {
      var r = el("div", "sk-row");
      var a = el("div", "sk-bar"); a.style.width = (58 + (i % 3) * 12) + "%";
      var b = el("div", "sk-bar"); b.style.width = (30 + (i % 2) * 10) + "%"; b.style.animationDelay = "0.15s";
      r.appendChild(a); r.appendChild(b);
      sk.appendChild(r);
    }
  })();

  window.addEventListener("message", function (event) {
    var m = event.data;
    if (!m || typeof m !== "object") return;
    if (m.id !== undefined && pending.has(m.id)) {
      var p = pending.get(m.id);
      pending.delete(m.id);
      if (m.error) p.reject(new Error(m.error.message || "Request failed")); else p.resolve(m.result);
      return;
    }
    if (m.method === "ui/notifications/tool-input") toolInput = (m.params && m.params.toolInput) || {};
    else if (m.method === "ui/notifications/tool-result") onToolResult(m.params || {});
    else if (m.method === "ui/notifications/host-context-changed") applyContext(m.params || {});
  });

  request("ui/initialize", { app: { name: "oratorio", version: "1.0" } })
    .then(function (result) {
      bridgeToken = result && typeof result.bridgeToken === "string" ? result.bridgeToken : null;
      applyContext(result && result.hostContext);
    })
    .catch(function () {});
</script>
</body>
</html>
